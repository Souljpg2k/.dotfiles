windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

#layerrule
layerrule = blur on, match:namespace waybar
layerrule = no_anim on, match:namespace waybar
layerrule = xray on, match:namespace waybar
layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0.5, match:namespace waybar
layerrule = ignore_alpha 0.5, match:namespace rofi
layerrule = animation slide, match:namespace rofi
layerrule = blur on, match:class mako
layerrule = ignore_alpha 0.1, match:class mako
layerrule = blur on, match:class hyprshot
layerrule = ignore_alpha 0.4, match:class hyprshot

#windowrule
windowrule = float on, match:class waypaper
windowrule = animation fade, match:class waypaper
windowrule = float on, match:class org.pulseaudio.pavucontrol
windowrule = animation slide, match:class org.pulseaudio.pavucontrol
windowrule = float on, match:namespace iwgtk
windowrule = animation slide, match:namespace iwgtk
windowrule = float off, match:class kitty
windowrule = float off, match:class brave-browser
windowrule = float off, match:class pcmanfm
windowrule = float off, match:class code-oss
