$font = JetBrains Mono
$placeholder_text = 󰄛  password
$bg = $HOME/Pictures/bg.jpg
$pfp = $HOME/Pictures/pfp.png

$shadow = rgb(0, 0, 0)
$font_color  = rgb(247, 247, 242)
$inner_color  = rgb(28, 28, 28)
$check_color = rgba(51, 51, 51, 0.44)
$fail_color = rgb(249, 53, 102)

general {
    hide_cursor = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = $bg

    blur_size = 2
    blur_passes = 2
    brightness = 0.04

}

image {
    monitor = 
    path = $pfp
    size = 100
    rounding = 50
    border_size = 0

    shadow_passes = 1
    shadow_size = 4
    shadow_color = $shadow
    shadow_boost = 1

    position = 0, 95
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    font_family = $font
    font_size = 17

    shadow_passes = 1
    shadow_size = 4
    shadow_color = $shadow
    shadow_boost = 1

    position = -0, 20
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 0
    font_color = $font_color
    inner_color = $inner_color
    check_color = $check_color
    fail_color = $fail_color

    fade_on_empty = false
    rounding = 15
    font_family = $font
    placeholder_text = $placeholder_text
    fail_text = $PAMFAIL

    dots_center = true
    dots_size = 0.3
    dots_spacing = 0.4

    shadow_passes = 1
    shadow_size = 4
    shadow_color = $shadow
    shadow_boost = 1

    position = 0, -20
    halign = center
    valign = center
}
