windowrule {
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

layerrule = animation slide, match:namespace rofi
windowrule = float on, match:class waypaper
windowrule = float on, match:class hyprpwcenter
windowrule = float on, match:namespace nautilus
windowrule = float off, match:class firefox
windowrule = float off, match:class kitty