general {
    gaps_in = 5
    gaps_out = 8

    border_size = 0

    col.active_border = rgba(4776E6EE) rgba(8E54E9EE) 45deg
    col.inactive_border = rgba(4776E6AA) rgba(8E54E9AA) 45deg

    resize_on_border = false

    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 16
    rounding_power = 3

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
    
    blur {
        enabled = false
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}
